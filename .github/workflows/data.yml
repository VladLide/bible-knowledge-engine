name: Build & publish data API to GitHub Pages

# Repo A publishes the canonical data as a static, versioned, CORS-enabled JSON
# API. The web app (repo: bke-web) and any third party consume it from here.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Validate canon (fails the build on any error)
        run: python -m compiler check
      - name: Compile data API (public/ is git-ignored, generated here)
        run: python -m compiler site
        env:
          BKE_BUILD_REV: ${{ github.sha }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
